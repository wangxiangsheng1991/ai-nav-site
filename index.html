<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具导航 | 一站式AI聊天入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .stats {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: inline-block;
            margin-top: 20px;
        }

        .search-box {
            max-width: 500px;
            margin: 0 auto 40px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-box input:focus {
            outline: none;
            transform: translateY(-2px);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .category-btn {
            padding: 8px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: white;
            color: #667eea;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .tool-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .tool-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .price-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .price-free { background: #10b981; color: white; }
        .price-freemium { background: #f59e0b; color: white; }
        .price-paid { background: #ef4444; color: white; }

        .tool-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .tool-company {
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .tool-description {
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .feature-tag {
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #4b5563;
        }

        .visit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
        }

        .visit-btn:hover {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            padding: 30px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .tools-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI工具导航</h1>
            <p>一站式AI聊天助手入口 | 发现最强大的AI工具</p>
            <div class="stats">
                📊 收录 <span id="toolCount">0</span> 款AI工具 | 🔥 持续更新中
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索AI工具... (例如：DeepSeek、文心一言)">
        </div>

        <div class="categories">
            <button class="category-btn active" data-category="all">全部</button>
            <button class="category-btn" data-category="chat">💬 通用对话</button>
            <button class="category-btn" data-category="coding">💻 编程助手</button>
        </div>

        <div id="toolsGrid" class="tools-grid"></div>

        <div class="footer">
            <p>© 2024 AI工具导航 | 点击卡片或按钮即可访问对应AI工具</p>
        </div>
    </div>

    <script>
        const toolsData = [
            {
                name: "DeepSeek",
                company: "深度求索",
                description: "深度求索推出的免费AI助手，支持100万token上下文，擅长深度思考和代码生成。",
                icon: "🔍",
                url: "https://chat.deepseek.com",
                price: "free",
                features: ["100万上下文", "代码能力强", "完全免费"],
                category: "chat"
            },
            {
                name: "通义千问",
                company: "阿里巴巴",
                description: "阿里云推出的超大规模语言模型，支持多轮对话、文案创作、逻辑推理等。",
                icon: "💭",
                url: "https://tongyi.aliyun.com",
                price: "free",
                features: ["多轮对话", "文案创作", "免费使用"],
                category: "chat"
            },
            {
                name: "文心一言",
                company: "百度",
                description: "百度自主研发的知识增强大语言模型，具备文学创作、商业文案、逻辑推理等能力。",
                icon: "📝",
                url: "https://yiyan.baidu.com",
                price: "free",
                features: ["知识增强", "文学创作", "多模态理解"],
                category: "chat"
            },
            {
                name: "ChatGPT",
                company: "OpenAI",
                description: "最知名的AI聊天机器人，GPT-4模型具备强大的推理和创造能力。",
                icon: "💬",
                url: "https://chat.openai.com",
                price: "freemium",
                features: ["GPT-4", "DALL-E 3", "插件生态"],
                category: "chat"
            },
            {
                name: "Claude",
                company: "Anthropic",
                description: "注重安全性的AI助手，擅长长文本处理和分析，支持200K上下文。",
                icon: "🔐",
                url: "https://claude.ai",
                price: "freemium",
                features: ["200K上下文", "安全性高", "文件分析"],
                category: "chat"
            },
            {
                name: "Kimi",
                company: "月之暗面",
                description: "支持200万字超长上下文，擅长阅读长文档、网页链接分析。",
                icon: "📚",
                url: "https://kimi.moonshot.cn",
                price: "free",
                features: ["200万字上下文", "链接阅读", "文件处理"],
                category: "chat"
            },
            {
                name: "智谱清言",
                company: "智谱AI",
                description: "基于GLM模型的中文AI助手，支持联网搜索、代码解释等功能。",
                icon: "🧠",
                url: "https://chatglm.cn",
                price: "free",
                features: ["中文优化", "联网搜索", "代码解释"],
                category: "chat"
            },
            {
                name: "豆包",
                company: "字节跳动",
                description: "字节跳动推出的AI对话助手，支持文本生成、信息查询等。",
                icon: "🫘",
                url: "https://www.doubao.com",
                price: "free",
                features: ["快速响应", "多场景", "免费使用"],
                category: "chat"
            },
            {
                name: "腾讯混元",
                company: "腾讯",
                description: "腾讯研发的大语言模型，支持多轮对话、内容生成、知识问答。",
                icon: "🔮",
                url: "https://hunyuan.tencent.com",
                price: "free",
                features: ["多轮对话", "内容创作", "知识问答"],
                category: "chat"
            },
            {
                name: "讯飞星火",
                company: "科大讯飞",
                description: "讯飞推出的认知大模型，具备跨领域知识和语言理解能力。",
                icon: "✨",
                url: "https://xinghuo.xfyun.cn",
                price: "free",
                features: ["跨领域知识", "语音交互", "多模态"],
                category: "chat"
            },
            {
                name: "CodeGeeX",
                company: "智谱AI",
                description: "免费的AI编程助手，支持多种IDE插件，代码生成和解释。",
                icon: "💻",
                url: "https://codegeex.cn",
                price: "free",
                features: ["IDE插件", "代码生成", "完全免费"],
                category: "coding"
            },
            {
                name: "GitHub Copilot",
                company: "GitHub",
                description: "最强大的AI编程助手，深度集成IDE，实时代码建议。",
                icon: "👨‍💻",
                url: "https://github.com/features/copilot",
                price: "paid",
                features: ["IDE集成", "实时建议", "多语言"],
                category: "coding"
            }
        ];

        let currentCategory = "all";
        let currentSearch = "";

        function renderTools() {
            const filteredTools = toolsData.filter(tool => {
                if (currentCategory !== "all" && tool.category !== currentCategory) return false;
                if (currentSearch) {
                    const searchLower = currentSearch.toLowerCase();
                    return tool.name.toLowerCase().includes(searchLower) ||
                           tool.company.toLowerCase().includes(searchLower) ||
                           tool.description.toLowerCase().includes(searchLower);
                }
                return true;
            });

            const toolsGrid = document.getElementById("toolsGrid");
            document.getElementById("toolCount").textContent = filteredTools.length;

            if (filteredTools.length === 0) {
                toolsGrid.innerHTML = `<div class="empty-state">😅 没有找到相关AI工具<br>试试其他关键词吧~</div>`;
                return;
            }

            toolsGrid.innerHTML = filteredTools.map(tool => `
                <div class="tool-card" data-url="${tool.url}">
                    <div class="card-header">
                        <div class="tool-icon">${tool.icon}</div>
                        <div class="price-tag price-${tool.price}">
                            ${tool.price === "free" ? "免费" : tool.price === "freemium" ? "免费+付费" : "付费"}
                        </div>
                    </div>
                    <div class="tool-name">${tool.name}</div>
                    <div class="tool-company">${tool.company}</div>
                    <div class="tool-description">${tool.description}</div>
                    <div class="features">
                        ${tool.features.map(f => `<span class="feature-tag">${f}</span>`).join("")}
                    </div>
                    <button class="visit-btn" onclick="window.open('${tool.url}', '_blank')">🚀 立即访问 →</button>
                </div>
            `).join("");

            document.querySelectorAll('.tool-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('visit-btn')) return;
                    window.open(card.getAttribute('data-url'), '_blank');
                });
            });
        }

        function init() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.getAttribute('data-category');
                    renderTools();
                });
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value;
                renderTools();
            });

            renderTools();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
